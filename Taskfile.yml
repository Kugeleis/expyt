version: "3"

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - uv sync

  lint:
    desc: Run ruff linter and formatter check
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  format:
    desc: Auto-format code with ruff
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  typecheck:
    desc: Run mypy in strict mode
    cmds:
      - uv run mypy --strict app

  test:
    desc: Run tests with coverage
    cmds:
      - uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=90

  check:
    desc: Run all quality gates (lint, typecheck, test) — fails fast
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  dev:
    desc: Run the FastAPI app locally in development mode (with auto-reload)
    cmds:
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port 8000

  docs:generate:
    desc: Generate OpenAPI JSON schema and interactive ReDoc documentation
    cmds:
      - uv run python scripts/generate_openapi.py

  docs:build:
    desc: Build static documentation pages
    deps: [docs:generate]
    cmds:
      - uv run mkdocs build

  docs:serve:
    desc: Serve the documentation site locally with live reload
    deps: [docs:generate]
    cmds:
      - uv run mkdocs serve --dev-addr 127.0.0.1:8001

  bump:
    desc: Bump application version using bump-my-version (e.g. task bump -- patch)
    cmds:
      - uv run bump-my-version bump {{.CLI_ARGS}}


