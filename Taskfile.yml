version: "3"

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - uv sync

  lint:
    desc: Run Python and JS linters and formatters check
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - task: lint:js

  lint:js:
    desc: Run ESLint and Prettier check on JS files
    cmds:
      - uv run pre-commit run eslint --all-files
      - uv run pre-commit run prettier --all-files

  format:
    desc: Auto-format Python and JS code
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .
      - task: format:js

  format:js:
    desc: Auto-format JS files with Prettier
    cmds:
      - uv run pre-commit run prettier --all-files || true

  typecheck:
    desc: Run mypy in strict mode
    cmds:
      - uv run mypy --strict app

  test:
    desc: Run tests with coverage
    cmds:
      - uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80 --ignore=tests/e2e/test_playwright_e2e.py

  check:
    desc: Run all quality gates (lint, typecheck, test) — fails fast
    cmds:
      - task: lint
      - task: typecheck
      - task: test

  clean:
    desc: Clean ruff, pytest, uv caches and remove merged local branches
    cmds:
      - rm -rf .ruff_cache .pytest_cache
      - timeout 10 uv cache clean || true
      - git branch --merged | grep -v -E "^\*|master|main|develop" | xargs -r git branch -d || true

  dev:
    desc: Run the FastAPI app locally in development mode (with auto-reload)
    cmds:
      - uv run uvicorn app.main:app --reload --host 127.0.0.1 --port 8000

  docs:generate:
    desc: Generate OpenAPI JSON schema and interactive ReDoc documentation
    cmds:
      - uv run python scripts/generate_openapi.py

  docs:build:
    desc: Build static documentation pages
    deps: [docs:generate]
    cmds:
      - uv run mkdocs build

  docs:serve:
    desc: Serve the documentation site locally with live reload
    deps: [docs:generate]
    cmds:
      - uv run mkdocs serve --dev-addr 127.0.0.1:8001

  bump:
    desc: Bump application version using bump-my-version (e.g. task bump -- patch)
    cmds:
      - uv run bump-my-version bump {{.CLI_ARGS}}

  b-m:
    desc: Bump minor version using bump-my-version
    cmds:
      - uv run bump-my-version bump minor

  b-p:
    desc: Bump patch version using bump-my-version
    cmds:
      - uv run bump-my-version bump patch
