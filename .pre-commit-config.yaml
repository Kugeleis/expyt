repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - fastapi>=0.115
          - pandas-stubs>=2.2
          - types-reportlab>=4.2
          - pyarrow
        pass_filenames: false
        entry: mypy --strict app
