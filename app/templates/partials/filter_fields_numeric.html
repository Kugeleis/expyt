<div class="filter-type-fields" id="fields-numeric_range">
    <div class="auto-grid" style="--grid-min: 180px; --grid-gap: 1rem;">
        <div>
            <label for="filter-num-min">Min Value (Optional)</label>
            <input type="number" step="any" name="min_val" id="filter-num-min" placeholder="No minimum" />
        </div>
        <div>
            <label for="filter-num-max">Max Value (Optional)</label>
            <input type="number" step="any" name="max_val" id="filter-num-max" placeholder="No maximum" />
        </div>
    </div>
</div>
