<div class="filter-type-fields" id="fields-category_filter">
    <div>
        <label for="filter-cat-values">Values (comma-separated)</label>
        <input type="text" name="values" id="filter-cat-values" placeholder="e.g. Boston, Chicago" />
    </div>
    <fieldset>
        <label for="filter-cat-exclude">
            <input type="checkbox" name="exclude" id="filter-cat-exclude" value="true" />
            Exclude these values (Exclude mode)
        </label>
    </fieldset>
</div>
