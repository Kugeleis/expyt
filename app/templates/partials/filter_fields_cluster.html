<div class="filter-type-fields" id="fields-cluster_exclusion">
    <div class="auto-grid" style="--grid-min: 180px; --grid-gap: 1rem;">
        <div>
            <label for="filter-cluster-id">Cluster ID to Exclude</label>
            <input type="text" name="cluster_id" id="filter-cluster-id" placeholder="e.g. Cluster_0" />
        </div>
        <div>
            <label for="filter-cluster-reason">Reason (Required)</label>
            <input type="text" name="reason" id="filter-cluster-reason" placeholder="e.g. outlier, equipment failure" />
        </div>
    </div>
</div>
